    // ── Calendar Tab ──
    function CalendarTab() {
      const [year, setYear] = React.useState(new Date().getFullYear());
      const [month, setMonth] = React.useState(new Date().getMonth() + 1);
      const [deadlines, setDeadlines] = React.useState([]);
      const [selectedDay, setSelectedDay] = React.useState(null);
      const [loading, setLoading] = React.useState(true);

      const fetchDeadlines = async () => {
        setLoading(true);
        try {
          const res = await fetch(`${API}/api/calendar/month/${year}/${month}`);
          if (res.ok) {
            const data = await res.json();
            setDeadlines(data.deadlines || data || []);
          }
        } catch (e) { console.log('カレンダー取得エラー:', e); }
        setLoading(false);
      };

      React.useEffect(() => { fetchDeadlines(); }, [year, month]);

      const prevMonth = () => {
        if (month === 1) { setMonth(12); setYear(year - 1); }
        else setMonth(month - 1);
      };
      const nextMonth = () => {
        if (month === 12) { setMonth(1); setYear(year + 1); }
        else setMonth(month + 1);
      };

      const today = new Date();
      const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

      // Build calendar days
      const firstDay = new Date(year, month - 1, 1);
      const lastDay = new Date(year, month, 0);
      const startDow = firstDay.getDay(); // 0=Sun
      const daysInMonth = lastDay.getDate();
      const prevLastDay = new Date(year, month - 1, 0).getDate();

      const days = [];
      // Previous month fill
      for (let i = startDow - 1; i >= 0; i--) {
        days.push({ day: prevLastDay - i, inMonth: false, date: null });
      }
      // Current month
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        days.push({ day: d, inMonth: true, date: dateStr });
      }
      // Next month fill
      const remaining = 7 - (days.length % 7);
      if (remaining < 7) {
        for (let i = 1; i <= remaining; i++) {
          days.push({ day: i, inMonth: false, date: null });
        }
      }

      const getDeadlinesForDay = (dateStr) => {
        if (!dateStr) return [];
        return deadlines.filter(d => (d.deadline_date || d.due_date || '') === dateStr);
      };

      const getDeadlineClass = (d) => {
        const deadlineDate = new Date(d.deadline_date || d.due_date);
        const diff = (deadlineDate - today) / (1000 * 60 * 60 * 24);
        if (diff < 0) return 'overdue';
        if (diff <= 7) return 'soon';
        return 'future';
      };

      const dayNames = ['日', '月', '火', '水', '木', '金', '土'];

      return (
        <>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
            <h1 style={{ fontSize: 22, fontWeight: 700, color: '#1F4E79' }}>申告カレンダー</h1>
            <button className="btn-primary" onClick={async () => {
              try {
                const clientsRes = await fetch(`${API}/api/clients`);
                const clsData = await clientsRes.json();
                const cls = clsData.clients || clsData || [];
                for (const c of cls) {
                  await fetch(`${API}/api/clients/${c.id}/generate-deadlines`, { method: 'POST' });
                }
                fetchDeadlines();
                alert('期限を自動生成しました');
              } catch (e) { alert('生成エラー: ' + e.message); }
            }}>🔄 期限自動生成</button>
          </div>
          {/* Month navigation */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 16 }}>
            <button onClick={prevMonth} className="btn-secondary" style={{ padding: '6px 12px' }}>◀</button>
            <div style={{ fontSize: 18, fontWeight: 700, color: '#1F4E79' }}>{year}年 {month}月</div>
            <button onClick={nextMonth} className="btn-secondary" style={{ padding: '6px 12px' }}>▶</button>
            <button onClick={() => { setYear(today.getFullYear()); setMonth(today.getMonth() + 1); }} className="btn-secondary" style={{ padding: '6px 12px', marginLeft: 8 }}>今月</button>
          </div>
          {/* Legend */}
          <div style={{ display: 'flex', gap: 16, marginBottom: 12, fontSize: 12 }}>
            <span><span className="deadline-pill overdue" style={{ marginRight: 4 }}>●</span>期限超過</span>
            <span><span className="deadline-pill soon" style={{ marginRight: 4 }}>●</span>7日以内</span>
            <span><span className="deadline-pill future" style={{ marginRight: 4 }}>●</span>今後の期限</span>
          </div>
          {/* Calendar grid */}
          <div className="calendar-grid">
            {dayNames.map((dn, i) => <div key={dn} className="day-header" style={{ color: i === 0 ? '#EF4444' : i === 6 ? '#3B82F6' : '#64748B' }}>{dn}</div>)}
            {days.map((d, i) => {
              const dow = i % 7;
              const dayDeadlines = getDeadlinesForDay(d.date);
              const isToday = d.date === todayStr;
              return (
                <div key={i}
                  className={`day-cell ${d.inMonth ? '' : 'other-month'} ${isToday ? 'today' : ''} ${dow === 0 ? 'sunday' : ''} ${dow === 6 ? 'saturday' : ''}`}
                  onClick={() => d.inMonth && dayDeadlines.length > 0 && setSelectedDay({ date: d.date, deadlines: dayDeadlines })}>
                  <div className="day-num">{d.day}</div>
                  {dayDeadlines.slice(0, 3).map((dl, j) => (
                    <div key={j} className={`deadline-pill ${getDeadlineClass(dl)}`}>{dl.deadline_type || dl.title || '期限'}</div>
                  ))}
                  {dayDeadlines.length > 3 && <div style={{ fontSize: 10, color: '#94A3B8' }}>+{dayDeadlines.length - 3}件</div>}
                </div>
              );
            })}
          </div>
          {/* Day detail modal */}
          {selectedDay && (
            <div className="modal-overlay" onClick={() => setSelectedDay(null)}>
              <div className="modal-box" onClick={e => e.stopPropagation()}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                  <div style={{ fontSize: 17, fontWeight: 700 }}>📅 {selectedDay.date} の期限</div>
                  <button onClick={() => setSelectedDay(null)} style={{ border: 'none', background: 'none', cursor: 'pointer', fontSize: 20, color: '#94A3B8' }}>✕</button>
                </div>
                {selectedDay.deadlines.map((dl, i) => (
                  <div key={i} style={{ padding: '10px 14px', borderBottom: '1px solid #F1F5F9', display: 'flex', alignItems: 'center', gap: 10 }}>
                    <span className={`deadline-pill ${getDeadlineClass(dl)}`} style={{ flexShrink: 0 }}>{dl.deadline_type || dl.type || '期限'}</span>
                    <div>
                      <div style={{ fontWeight: 600, fontSize: 14 }}>{dl.deadline_type || dl.title || ''}</div>
                      {dl.client_name && <div style={{ fontSize: 12, color: '#64748B' }}>{dl.client_name}</div>}
                      {dl.description && <div style={{ fontSize: 12, color: '#94A3B8' }}>{dl.description}</div>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </>
      );
    }

    // ── Checklists Tab ──
    function ChecklistsTab() {
      const [checklists, setChecklists] = React.useState([]);
      const [selectedChecklist, setSelectedChecklist] = React.useState(null);
      const [showTemplateDropdown, setShowTemplateDropdown] = React.useState(false);
      const [loading, setLoading] = React.useState(true);

      const fetchChecklists = async () => {
        try {
          const res = await fetch(`${API}/api/checklists`);
          if (res.ok) { const d = await res.json(); setChecklists(d.checklists || d || []); }
        } catch (e) { console.log('チェックリスト取得エラー:', e); }
        setLoading(false);
      };

      React.useEffect(() => { fetchChecklists(); }, []);

      const createFromTemplate = async (templateKey) => {
        const template = CHECKLIST_TEMPLATES[templateKey];
        if (!template) return;
        setShowTemplateDropdown(false);
        try {
          const res = await fetch(`${API}/api/checklists`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              template_type: templateKey,
              title: template.name,
              items: template.items
            })
          });
          if (res.ok) fetchChecklists();
        } catch (e) { alert('作成エラー: ' + e.message); }
      };

      const toggleItem = async (checklistId, itemId) => {
        try {
          await fetch(`${API}/api/checklists/${checklistId}/items/${itemId}/toggle`, { method: 'PUT' });
          // Optimistic update
          setChecklists(prev => prev.map(cl => {
            if (cl.id === checklistId) {
              return {
                ...cl,
                items: cl.items.map(item =>
                  (item.id === itemId) ? { ...item, done: !item.is_checked } : item
                )
              };
            }
            return cl;
          }));
          if (selectedChecklist?.id === checklistId) {
            setSelectedChecklist(prev => ({
              ...prev,
              items: prev.items.map(item =>
                (item.id === itemId) ? { ...item, done: !item.is_checked } : item
              )
            }));
          }
        } catch (e) { console.log('トグルエラー:', e); }
      };

      const getProgress = (cl) => {
        if (!cl.items || cl.items.length === 0) return 0;
        return Math.round((cl.items.filter(i => i.is_checked).length / cl.items.length) * 100);
      };

      if (selectedChecklist) {
        const cl = checklists.find(c => c.id === selectedChecklist.id) || selectedChecklist;
        const progress = getProgress(cl);
        return (
          <>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}>
              <button className="btn-secondary" onClick={() => setSelectedChecklist(null)} style={{ padding: '6px 12px' }}>← 戻る</button>
              <h1 style={{ fontSize: 22, fontWeight: 700, color: '#1F4E79' }}>{cl.title || cl.name}</h1>
            </div>
            <div style={{ marginBottom: 16 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: '#64748B', marginBottom: 4 }}>
                <span>{cl.items?.filter(i => i.is_checked).length || 0} / {cl.items?.length || 0} 完了</span>
                <span>{progress}%</span>
              </div>
              <div className="progress-bar"><div className="progress-bar-fill" style={{ width: `${progress}%` }} /></div>
            </div>
            <div className="section-card">
              {(cl.items || []).map((item, i) => (
                <div key={item.id || i} className={`checklist-item ${item.is_checked ? 'done' : ''}`} onClick={() => toggleItem(cl.id, item.id)}>
                  <div className={`checklist-checkbox ${item.is_checked ? 'checked' : ''}`}>
                    {item.is_checked && '✓'}
                  </div>
                  <span className="checklist-label" style={{ flex: 1 }}>{item.item_text || item.text}</span>
                </div>
              ))}
            </div>
          </>
        );
      }

      return (
        <>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
            <h1 style={{ fontSize: 22, fontWeight: 700, color: '#1F4E79' }}>チェックリスト</h1>
            <div style={{ position: 'relative' }}>
              <button className="btn-primary" onClick={() => setShowTemplateDropdown(!showTemplateDropdown)}>＋ テンプレートから作成</button>
              {showTemplateDropdown && (
                <div style={{ position: 'absolute', right: 0, top: '100%', marginTop: 4, background: '#fff', borderRadius: 10, boxShadow: '0 4px 16px rgba(0,0,0,0.15)', border: '1px solid #E2E8F0', zIndex: 100, minWidth: 200 }}>
                  {Object.entries(CHECKLIST_TEMPLATES).map(([key, tmpl]) => (
                    <button key={key} onClick={() => createFromTemplate(key)}
                      style={{ display: 'block', width: '100%', padding: '10px 16px', border: 'none', background: 'none', textAlign: 'left', cursor: 'pointer', fontSize: 13, color: '#334155', borderBottom: '1px solid #F1F5F9' }}
                      onMouseEnter={e => e.target.style.background = '#F8FAFC'}
                      onMouseLeave={e => e.target.style.background = 'none'}>
                      {tmpl.name}
                    </button>
                  ))}
                </div>
              )}
            </div>
          </div>
          {loading ? (
            <div style={{ color: '#64748B', textAlign: 'center', padding: 40 }}>読み込み中...</div>
          ) : checklists.length === 0 ? (
            <div style={{ color: '#94A3B8', textAlign: 'center', padding: 40 }}>
              チェックリストがありません。「テンプレートから作成」で新しいチェックリストを追加してください。
            </div>
          ) : (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: 12 }}>
              {checklists.map(cl => {
                const progress = getProgress(cl);
                return (
                  <div key={cl.id} className="client-card" onClick={() => setSelectedChecklist(cl)}>
                    <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 8 }}>{cl.title || cl.name}</div>
                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: '#64748B', marginBottom: 4 }}>
                      <span>{cl.items?.filter(i => i.is_checked).length || 0} / {cl.items?.length || 0} 完了</span>
                      <span style={{ color: progress === 100 ? '#22C55E' : '#64748B', fontWeight: 600 }}>{progress}%</span>
                    </div>
                    <div className="progress-bar"><div className="progress-bar-fill" style={{ width: `${progress}%` }} /></div>
                    {cl.created_at && <div style={{ fontSize: 11, color: '#94A3B8', marginTop: 8 }}>作成: {cl.created_at}</div>}
                  </div>
                );
              })}
            </div>
          )}
        </>
      );
    }

    // ── Documents Tab ──
    function DocumentsTab() {
      const CATEGORIES = ['全て', '年金機構', '税務署', '労基署', '市区町村', '社内', 'その他'];
      const CATEGORY_COLORS = { '年金機構': '#3B82F6', '税務署': '#EF4444', '労基署': '#F59E0B', '市区町村': '#22C55E', '社内': '#8B5CF6', 'その他': '#6B7280' };
      const FIELD_TYPES = ['text', 'date', 'number', 'select', 'textarea'];
      const DOC_STATUS_LABEL = { draft: '下書き', completed: '完了', submitted: '提出済' };
      const DOC_STATUS_COLOR = { draft: '#F59E0B', completed: '#22C55E', submitted: '#3B82F6' };

      const [subView, setSubView] = React.useState('templates'); // templates | documents | formfill
      const [templates, setTemplates] = React.useState([]);
      const [documents, setDocuments] = React.useState([]);
      const [clients, setClients] = React.useState([]);
      const [search, setSearch] = React.useState('');
      const [catFilter, setCatFilter] = React.useState('全て');
      const [showModal, setShowModal] = React.useState(false);
      const [editTemplate, setEditTemplate] = React.useState(null);
      const [loading, setLoading] = React.useState(true);

      // Document list filters
      const [docClientFilter, setDocClientFilter] = React.useState('');
      const [docTemplateFilter, setDocTemplateFilter] = React.useState('');
      const [docStatusFilter, setDocStatusFilter] = React.useState('');

      // Form fill state
      const [formTemplateId, setFormTemplateId] = React.useState('');
      const [formClientId, setFormClientId] = React.useState('');
      const [formData, setFormData] = React.useState({});
      const [formEditDocId, setFormEditDocId] = React.useState(null);
      const [autoFilling, setAutoFilling] = React.useState(false);

      const fetchTemplates = async () => {
        try {
          const res = await fetch(`${API}/api/templates`);
          if (res.ok) { const d = await res.json(); setTemplates(d.templates || d || []); }
        } catch (e) { console.log('テンプレート取得エラー:', e); }
        setLoading(false);
      };

      const fetchDocuments = async () => {
        try {
          const res = await fetch(`${API}/api/documents`);
          if (res.ok) { const d = await res.json(); setDocuments(d.documents || d || []); }
        } catch (e) { console.log('書類取得エラー:', e); }
      };

      const fetchClients = async () => {
        try {
          const res = await fetch(`${API}/api/clients`);
          if (res.ok) { const d = await res.json(); setClients(d.clients || d || []); }
        } catch (e) {}
      };

      React.useEffect(() => { fetchTemplates(); fetchDocuments(); fetchClients(); }, []);

      const filteredTemplates = templates.filter(t => {
        if (catFilter !== '全て' && t.category !== catFilter) return false;
        if (search && !t.name?.toLowerCase().includes(search.toLowerCase()) && !t.description?.toLowerCase().includes(search.toLowerCase())) return false;
        return true;
      });

      const filteredDocs = documents.filter(d => {
        if (docClientFilter && d.client_id !== docClientFilter) return false;
        if (docTemplateFilter && d.template_id !== docTemplateFilter) return false;
        if (docStatusFilter && d.status !== docStatusFilter) return false;
        return true;
      });

      const selectedTemplate = templates.find(t => t.id === formTemplateId);

      const handleAutoFill = async () => {
        if (!formTemplateId || !formClientId) return;
        setAutoFilling(true);
        try {
          const res = await fetch(`${API}/api/templates/${formTemplateId}/autofill/${formClientId}`);
          if (res.ok) { const d = await res.json(); setFormData(prev => ({ ...prev, ...(d.data || d) })); }
        } catch (e) { console.log('自動入力エラー:', e); }
        setAutoFilling(false);
      };

      const handleSaveDocument = async (status) => {
        const body = { template_id: formTemplateId, client_id: formClientId, data: formData, status };
        try {
          const url = formEditDocId ? `${API}/api/documents/${formEditDocId}` : `${API}/api/documents`;
          const method = formEditDocId ? 'PUT' : 'POST';
          const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
          if (res.ok) {
            fetchDocuments();
            setSubView('documents');
            setFormData({});
            setFormEditDocId(null);
          }
        } catch (e) { console.log('書類保存エラー:', e); }
      };

      const handleEditDoc = (doc) => {
        setFormTemplateId(doc.template_id || '');
        setFormClientId(doc.client_id || '');
        setFormData(doc.data || {});
        setFormEditDocId(doc.id);
        setSubView('formfill');
      };

      // ── Template Modal ──
      const TemplateModal = ({ template, onClose }) => {
        const [form, setForm] = React.useState(template || { name: '', category: '税務署', source: '', file_type: '', description: '', tags: '', field_schema: [] });
        const [dragOver, setDragOver] = React.useState(false);
        const [uploadedFile, setUploadedFile] = React.useState(null);

        const handleFieldChange = (idx, key, val) => {
          const fields = [...(form.field_schema || [])];
          fields[idx] = { ...fields[idx], [key]: val };
          setForm({ ...form, field_schema: fields });
        };

        const addField = () => {
          setForm({ ...form, field_schema: [...(form.field_schema || []), { name: '', label: '', type: 'text', required: false, options: '' }] });
        };

        const removeField = (idx) => {
          const fields = [...(form.field_schema || [])];
          fields.splice(idx, 1);
          setForm({ ...form, field_schema: fields });
        };

        const handleFileDrop = (e) => {
          e.preventDefault(); setDragOver(false);
          const file = e.dataTransfer?.files?.[0] || e.target?.files?.[0];
          if (file) { setUploadedFile(file); setForm({ ...form, file_type: file.name.split('.').pop() || '' }); }
        };

        const handleSave = async () => {
          const body = { ...form, tags: typeof form.tags === 'string' ? form.tags.split(',').map(s => s.trim()).filter(Boolean) : form.tags };
          try {
            const url = template?.id ? `${API}/api/templates/${template.id}` : `${API}/api/templates`;
            const method = template?.id ? 'PUT' : 'POST';
            const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            if (res.ok) { fetchTemplates(); onClose(); }
          } catch (e) { console.log('テンプレート保存エラー:', e); }
        };

        return (
          <div className="modal-overlay" onClick={onClose}>
            <div className="modal-box modal-large" onClick={e => e.stopPropagation()} style={{ maxWidth: 700, maxHeight: '90vh', overflowY: 'auto' }}>
              <h2 style={{ fontSize: 18, fontWeight: 700, color: '#1F4E79', marginBottom: 20 }}>{template?.id ? 'テンプレート編集' : 'テンプレート登録'}</h2>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                <div className="form-group">
                  <label className="form-label">テンプレート名 *</label>
                  <input className="form-input" value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="例: 法人税確定申告書" />
                </div>
                <div className="form-group">
                  <label className="form-label">カテゴリ</label>
                  <select className="form-select" value={form.category} onChange={e => setForm({ ...form, category: e.target.value })}>
                    {CATEGORIES.filter(c => c !== '全て').map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">提出先</label>
                  <input className="form-input" value={form.source || ''} onChange={e => setForm({ ...form, source: e.target.value })} placeholder="例: 所轄税務署" />
                </div>
                <div className="form-group">
                  <label className="form-label">ファイル形式</label>
                  <input className="form-input" value={form.file_type || ''} onChange={e => setForm({ ...form, file_type: e.target.value })} placeholder="例: pdf, xlsx" />
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">説明</label>
                <textarea className="form-textarea" value={form.description || ''} onChange={e => setForm({ ...form, description: e.target.value })} placeholder="テンプレートの説明" />
              </div>
              <div className="form-group">
                <label className="form-label">タグ（カンマ区切り）</label>
                <input className="form-input" value={Array.isArray(form.tags) ? form.tags.join(', ') : (form.tags || '')} onChange={e => setForm({ ...form, tags: e.target.value })} placeholder="例: 法人税, 確定申告, 別表" />
              </div>

              {/* File upload area */}
              <div className="form-group">
                <label className="form-label">ファイルアップロード</label>
                <div
                  onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                  onDragLeave={() => setDragOver(false)}
                  onDrop={handleFileDrop}
                  onClick={() => document.getElementById('tmpl-file-input').click()}
                  style={{ border: `2px dashed ${dragOver ? '#1F4E79' : '#CBD5E0'}`, borderRadius: 12, padding: 28, textAlign: 'center', cursor: 'pointer', background: dragOver ? '#EFF6FF' : '#F8FAFC', transition: 'all 0.15s' }}>
                  <input id="tmpl-file-input" type="file" style={{ display: 'none' }} onChange={handleFileDrop} />
                  {uploadedFile
                    ? <div style={{ fontSize: 13, color: '#1F4E79', fontWeight: 600 }}>📎 {uploadedFile.name}</div>
                    : <div style={{ color: '#94A3B8', fontSize: 13 }}>📁 ファイルをドラッグ＆ドロップ、またはクリックして選択</div>
                  }
                </div>
              </div>

              {/* Field schema editor */}
              <div style={{ marginTop: 16 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                  <label className="form-label" style={{ marginBottom: 0 }}>フィールド定義</label>
                  <button className="btn-primary" style={{ fontSize: 11, padding: '4px 12px' }} onClick={addField}>＋ フィールド追加</button>
                </div>
                {(form.field_schema || []).length === 0 && (
                  <div style={{ color: '#94A3B8', fontSize: 12, textAlign: 'center', padding: 16 }}>フィールドが未定義です。「フィールド追加」で追加してください。</div>
                )}
                {(form.field_schema || []).map((f, i) => (
                  <div key={i} style={{ background: '#F8FAFC', borderRadius: 8, padding: 12, marginBottom: 8, border: '1px solid #E2E8F0' }}>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 100px 60px 40px', gap: 8, alignItems: 'center' }}>
                      <input className="form-input" placeholder="フィールド名" value={f.name || ''} onChange={e => handleFieldChange(i, 'name', e.target.value)} style={{ fontSize: 12, padding: '5px 8px' }} />
                      <input className="form-input" placeholder="ラベル" value={f.label || ''} onChange={e => handleFieldChange(i, 'label', e.target.value)} style={{ fontSize: 12, padding: '5px 8px' }} />
                      <select className="form-select" value={f.type || 'text'} onChange={e => handleFieldChange(i, 'type', e.target.value)} style={{ fontSize: 12, padding: '5px 8px' }}>
                        {FIELD_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                      </select>
                      <label style={{ fontSize: 11, display: 'flex', alignItems: 'center', gap: 3, cursor: 'pointer' }}>
                        <input type="checkbox" checked={!!f.required} onChange={e => handleFieldChange(i, 'required', e.target.checked)} /> 必須
                      </label>
                      <button onClick={() => removeField(i)} style={{ background: 'none', border: 'none', color: '#EF4444', cursor: 'pointer', fontSize: 16 }}>✕</button>
                    </div>
                    {f.type === 'select' && (
                      <div style={{ marginTop: 6 }}>
                        <input className="form-input" placeholder="選択肢（カンマ区切り）" value={f.options || ''} onChange={e => handleFieldChange(i, 'options', e.target.value)} style={{ fontSize: 12, padding: '5px 8px' }} />
                      </div>
                    )}
                  </div>
                ))}
              </div>

              <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 10, marginTop: 20 }}>
                <button className="btn-secondary" onClick={onClose}>キャンセル</button>
                <button className="btn-primary" onClick={handleSave}>保存</button>
              </div>
            </div>
          </div>
        );
      };

      // ── Render ──
      return (
        <>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
            <h1 style={{ fontSize: 22, fontWeight: 700, color: '#1F4E79' }}>書類管理</h1>
          </div>

          {/* Sub-view tabs */}
          <div className="tab-filter" style={{ marginBottom: 20 }}>
            <button className={subView === 'templates' ? 'active' : ''} onClick={() => setSubView('templates')}>テンプレート一覧</button>
            <button className={subView === 'documents' ? 'active' : ''} onClick={() => setSubView('documents')}>作成済み書類</button>
            <button className={subView === 'formfill' ? 'active' : ''} onClick={() => setSubView('formfill')}>書類作成</button>
          </div>

          {/* ── Template List ── */}
          {subView === 'templates' && (
            <>
              <div style={{ display: 'flex', gap: 10, marginBottom: 16, flexWrap: 'wrap', alignItems: 'center' }}>
                <input className="form-input" placeholder="🔍 テンプレート検索..." value={search} onChange={e => setSearch(e.target.value)} style={{ maxWidth: 260 }} />
                <button className="btn-primary" onClick={() => { setEditTemplate(null); setShowModal(true); }}>＋ テンプレート登録</button>
              </div>
              <div className="tab-filter">
                {CATEGORIES.map(c => (
                  <button key={c} className={catFilter === c ? 'active' : ''} onClick={() => setCatFilter(c)}>{c}</button>
                ))}
              </div>
              {loading ? (
                <div style={{ color: '#64748B', fontSize: 14, textAlign: 'center', marginTop: 40 }}>読み込み中...</div>
              ) : filteredTemplates.length === 0 ? (
                <div style={{ color: '#94A3B8', fontSize: 14, textAlign: 'center', marginTop: 40 }}>
                  {templates.length === 0 ? 'テンプレートがありません。「テンプレート登録」から追加してください。' : '該当するテンプレートが見つかりません。'}
                </div>
              ) : (
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: 14 }}>
                  {filteredTemplates.map(t => (
                    <div key={t.id} className="client-card" onClick={() => { setEditTemplate(t); setShowModal(true); }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
                        <div style={{ fontWeight: 700, fontSize: 14, color: '#1A202C' }}>{t.name}</div>
                        <span className="badge" style={{ background: (CATEGORY_COLORS[t.category] || '#6B7280') + '20', color: CATEGORY_COLORS[t.category] || '#6B7280' }}>{t.category}</span>
                      </div>
                      {t.description && <div style={{ fontSize: 12, color: '#64748B', marginBottom: 8, lineHeight: 1.5 }}>{t.description}</div>}
                      <div style={{ display: 'flex', gap: 12, fontSize: 11, color: '#94A3B8', flexWrap: 'wrap' }}>
                        {t.source && <span>提出先: {t.source}</span>}
                        {t.file_type && <span>形式: {t.file_type}</span>}
                        {t.field_schema && <span>フィールド: {t.field_schema.length}件</span>}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </>
          )}

          {/* ── Document List ── */}
          {subView === 'documents' && (
            <>
              <div style={{ display: 'flex', gap: 10, marginBottom: 16, flexWrap: 'wrap', alignItems: 'center' }}>
                <select className="form-select" value={docClientFilter} onChange={e => setDocClientFilter(e.target.value)} style={{ maxWidth: 180 }}>
                  <option value="">全ての顧問先</option>
                  {clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
                <select className="form-select" value={docTemplateFilter} onChange={e => setDocTemplateFilter(e.target.value)} style={{ maxWidth: 180 }}>
                  <option value="">全てのテンプレート</option>
                  {templates.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                </select>
                <select className="form-select" value={docStatusFilter} onChange={e => setDocStatusFilter(e.target.value)} style={{ maxWidth: 140 }}>
                  <option value="">全てのステータス</option>
                  <option value="draft">下書き</option>
                  <option value="completed">完了</option>
                  <option value="submitted">提出済</option>
                </select>
              </div>
              {filteredDocs.length === 0 ? (
                <div style={{ color: '#94A3B8', fontSize: 14, textAlign: 'center', marginTop: 40 }}>
                  {documents.length === 0 ? '作成済みの書類がありません。「書類作成」タブから作成してください。' : '該当する書類が見つかりません。'}
                </div>
              ) : (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  {filteredDocs.map(d => {
                    const tmpl = templates.find(t => t.id === d.template_id);
                    const client = clients.find(c => c.id === d.client_id);
                    return (
                      <div key={d.id} className="client-card" onClick={() => handleEditDoc(d)} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <div>
                          <div style={{ fontWeight: 700, fontSize: 14, color: '#1A202C' }}>{tmpl?.name || d.template_id}</div>
                          <div style={{ fontSize: 12, color: '#64748B', marginTop: 2 }}>顧問先: {client?.name || d.client_id || '未設定'}</div>
                          {d.updated_at && <div style={{ fontSize: 11, color: '#94A3B8', marginTop: 2 }}>更新: {new Date(d.updated_at).toLocaleDateString('ja-JP')}</div>}
                        </div>
                        <span className="badge" style={{ background: (DOC_STATUS_COLOR[d.status] || '#94A3B8') + '20', color: DOC_STATUS_COLOR[d.status] || '#94A3B8' }}>
                          {DOC_STATUS_LABEL[d.status] || d.status}
                        </span>
                      </div>
                    );
                  })}
                </div>
              )}
            </>
          )}

          {/* ── Form Fill ── */}
          {subView === 'formfill' && (
            <>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 20 }}>
                <div className="form-group">
                  <label className="form-label">テンプレート選択</label>
                  <select className="form-select" value={formTemplateId} onChange={e => { setFormTemplateId(e.target.value); setFormData({}); }}>
                    <option value="">-- テンプレートを選択 --</option>
                    {templates.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">顧問先選択</label>
                  <select className="form-select" value={formClientId} onChange={e => setFormClientId(e.target.value)}>
                    <option value="">-- 顧問先を選択 --</option>
                    {clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </div>
              </div>

              {formTemplateId && formClientId && (
                <div style={{ marginBottom: 16 }}>
                  <button className="btn-primary" onClick={handleAutoFill} disabled={autoFilling} style={{ fontSize: 12 }}>
                    {autoFilling ? '⏳ 自動入力中...' : '🤖 自動入力'}
                  </button>
                </div>
              )}

              {selectedTemplate && selectedTemplate.field_schema && selectedTemplate.field_schema.length > 0 ? (

    // ── ChatBubble (legacy for SecretaryChat) ──
    function ChatBubble({ msg, lineSettings, onLineSend }) {
      const [lineSending, setLineSending] = React.useState(false);
      const [lineSent, setLineSent] = React.useState(false);
      const [lineError, setLineError] = React.useState('');
      const [copied, setCopied] = React.useState(false);

      const hasLineToken = lineSettings.channelToken && lineSettings.lineUserId;

      const handleCopy = () => {
        navigator.clipboard.writeText(msg.content).then(() => {
          setCopied(true); setTimeout(() => setCopied(false), 2500);
        }).catch(() => {
          const ta = document.createElement('textarea');
          ta.value = msg.content;
          document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
          setCopied(true); setTimeout(() => setCopied(false), 2500);
        });
      };

      const handleLineOpen = () => {
        window.open(`https://line.me/R/msg/text/?${encodeURIComponent(msg.content)}`, '_blank');
      };

      const handleLineSend = async () => {
        if (!hasLineToken || lineSending) return;
        setLineSending(true); setLineError('');
        try {
          const res = await fetch(`${API}/api/line/push`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ to: lineSettings.lineUserId, message: msg.content, channel_token: lineSettings.channelToken })
          });
          if (!res.ok) { const err = await res.json(); throw new Error(err.detail || 'LINE送信エラー'); }
          setLineSent(true); setTimeout(() => setLineSent(false), 3000);
        } catch(e) { setLineError(e.message); setTimeout(() => setLineError(''), 4000); }
        finally { setLineSending(false); }
      };

      if (msg.role === 'user') return <div className="msg-user">{msg.content}</div>;
      if (msg.role === 'thinking') return <div className="msg-thinking">🧠 <strong>思考中...</strong> {msg.content}</div>;
      if (msg.role === 'tool_use') return <div className="msg-tool">🔧 <strong>ツール実行:</strong> {msg.content}</div>;
      if (msg.role === 'error') return <div className="msg-error">⚠️ {msg.content}</div>;
      if (msg.role === 'typing') return (
        <div style={{ alignSelf: 'flex-start', background: '#fff', borderRadius: '16px 16px 16px 4px', padding: '12px 18px', boxShadow: '0 1px 4px rgba(0,0,0,0.08)' }}>
          <span className="typing-dot"/><span className="typing-dot"/><span className="typing-dot"/>
        </div>
      );
      return (
        <div style={{ alignSelf: 'flex-start', display: 'flex', gap: 10, maxWidth: '82%' }}>
          <div style={{ width: 32, height: 32, borderRadius: '50%', background: '#2E75B6', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, flexShrink: 0, marginTop: 4 }}>秘</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6, flex: 1 }}>
            <div className="msg-assistant">{msg.content}</div>
            {msg.content && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                <button onClick={handleCopy}
                  style={{ border: '1px solid #CBD5E0', background: copied ? '#DCFCE7' : '#fff', color: copied ? '#166534' : '#334155', borderRadius: 6, padding: '4px 10px', fontSize: 11, cursor: 'pointer', fontWeight: 600, transition: 'all 0.15s' }}>
                  {copied ? '✓ コピー済み' : '📋 コピー'}
                </button>
                <button onClick={handleLineOpen}
                  style={{ background: '#00B900', color: '#fff', border: 'none', borderRadius: 6, padding: '4px 10px', fontSize: 11, cursor: 'pointer', fontWeight: 700 }}>
                  📱 LINEで送る
                </button>
                {hasLineToken && (lineSent
                  ? <span className="line-sent">✓ Bot送信完了</span>
                  : lineError
                  ? <span style={{ fontSize: 11, color: '#DC2626' }}>⚠️ {lineError}</span>
                  : <button className="line-btn" onClick={handleLineSend} disabled={lineSending} style={{ background: '#1D4ED8' }}>
                      {lineSending ? '送信中...' : '🤖 Bot送信'}
                    </button>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── SecretaryChat (legacy, kept intact) ──
    function SecretaryChat() {
      const [messages, setMessages] = React.useState([
        { id: 0, role: 'assistant', content: 'こんにちは！税理士事務所の秘書AIです。\n\n以下のことをお手伝いできます：\n\n📋 書類チェックリストの作成（法人税・所得税・相続税など）\n✉️ 顧客への連絡文書・メールの下書き\n🔍 問い合わせの整理・担当AI振り分け\n\nAIの回答は：\n・「📋 コピー」→ クリップボードにコピー\n・「📱 LINEで送る」→ LINEアプリが開いて送信できます（設定不要！）\n\n下のクイックボタンかメッセージを入力してお使いください。' }
      ]);
      const [input, setInput] = React.useState('');
      const [isLoading, setIsLoading] = React.useState(false);
      const [history, setHistory] = React.useState([]);
      const [lineSettings, setLineSettings] = React.useState(() => {
        try { return JSON.parse(localStorage.getItem('lineSettings') || '{}'); } catch { return {}; }
      });
      const [showLineModal, setShowLineModal] = React.useState(false);
      const messagesEndRef = React.useRef(null);

      React.useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

      const saveLineSettings = (s) => {
        setLineSettings(s); try { localStorage.setItem('lineSettings', JSON.stringify(s)); } catch {}
      };

      const sendMessage = async (text) => {
        if (!text.trim() || isLoading) return;
        const userText = text.trim();
        setInput(''); setIsLoading(true);
        const userMsgId = Date.now();
        setMessages(prev => [...prev, { id: userMsgId, role: 'user', content: userText }]);
        const typingId = userMsgId + 1;
        setMessages(prev => [...prev, { id: typingId, role: 'typing', content: '' }]);
        let assistantText = '';
        const assistantMsgId = userMsgId + 2;
        try {
          const res = await fetch(`${API}/api/agents/hisho/chat`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: userText, history })
          });
          if (!res.ok) throw new Error(`HTTPエラー: ${res.status}`);
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          setMessages(prev => prev.filter(m => m.id !== typingId).concat({ id: assistantMsgId, role: 'assistant', content: '' }));
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            for (const line of decoder.decode(value).split('\n')) {
              if (!line.startsWith('data: ')) continue;
              try {
                const data = JSON.parse(line.slice(6));
                if (data.type === 'text') {
                  assistantText += data.text;
                  const captured = assistantText;
                  setMessages(prev => prev.map(m => m.id === assistantMsgId ? { ...m, content: captured } : m));
                } else if (data.type === 'thinking') {
                  const thinkId = Date.now() + Math.random();
                  setMessages(prev => {
                    const filtered = prev.filter(m => m.id !== assistantMsgId);
                    return [...filtered, { id: thinkId, role: 'thinking', content: data.thinking }, { id: assistantMsgId, role: 'assistant', content: assistantText }];
                  });
                } else if (data.type === 'tool_use') {
                  const toolId = Date.now() + Math.random();
                  const toolLabel = { generate_document_checklist: '📋 書類チェックリスト生成中...', classify_inquiry: '🔍 問い合わせ分類中...', draft_communication: '✉️ 文書下書き作成中...' }[data.tool] || `🔧 ${data.tool} 実行中...`;
                  setMessages(prev => {
                    const filtered = prev.filter(m => m.id !== assistantMsgId);
                    return [...filtered, { id: toolId, role: 'tool_use', content: toolLabel }, { id: assistantMsgId, role: 'assistant', content: assistantText }];
                  });
                } else if (data.type === 'error') {
                  setMessages(prev => prev.filter(m => m.id !== typingId).concat({ id: assistantMsgId, role: 'error', content: data.error }));
                }
              } catch {}
            }
          }
          setHistory(prev => [...prev, { role: 'user', content: userText }, { role: 'assistant', content: assistantText }]);
        } catch (err) {
          setMessages(prev => prev.filter(m => m.id !== typingId).concat({ id: assistantMsgId, role: 'error', content: `接続エラー: ${err.message}\nANTHROPIC_API_KEYが設定されているか確認してください。` }));
        } finally { setIsLoading(false); }
      };

      const handleKeyDown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(input); } };
      const hasLine = lineSettings.channelToken && lineSettings.lineUserId;

      return (
        <div className="chat-container">
          {showLineModal && <LineSettingsModal settings={lineSettings} onSave={saveLineSettings} onClose={() => setShowLineModal(false)} />}
          <div style={{ background: '#fff', padding: '12px 20px', borderBottom: '1px solid #E2E8F0', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <div style={{ width: 38, height: 38, borderRadius: '50%', background: '#2E75B6', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 17, fontWeight: 700 }}>秘</div>
              <div>
                <div style={{ fontWeight: 700, fontSize: 14, color: '#1F4E79' }}>秘書AI エージェント</div>
                <div style={{ fontSize: 11, color: '#22C55E' }}>● Claude Opus 4.6 · Adaptive Thinking</div>
              </div>
            </div>
            <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
              <div style={{ fontSize: 11, color: hasLine ? '#00B900' : '#94A3B8', fontWeight: 600 }}>{hasLine ? '📱 LINE接続済' : '📱 LINE未設定'}</div>
              <button onClick={() => setShowLineModal(true)} style={{ background: hasLine ? '#00B900' : '#F1F5F9', color: hasLine ? '#fff' : '#334155', border: 'none', borderRadius: 8, padding: '6px 14px', cursor: 'pointer', fontSize: 12, fontWeight: 700 }}>LINE設定</button>
              <button onClick={() => { setMessages([{ id: 0, role: 'assistant', content: '会話をリセットしました。' }]); setHistory([]); }}
                style={{ border: '1px solid #E2E8F0', background: '#fff', borderRadius: 8, padding: '6px 12px', cursor: 'pointer', fontSize: 12, color: '#64748B' }}>🗑 リセット</button>
            </div>
          </div>
          <div style={{ padding: '8px 16px', background: '#F8FAFC', borderBottom: '1px solid #E2E8F0', display: 'flex', gap: 6, flexWrap: 'wrap', flexShrink: 0 }}>
            {QUICK_ACTIONS.map((qa, i) => (
              <button key={i} onClick={() => sendMessage(qa.text)} disabled={isLoading}
                style={{ border: '1px solid #CBD5E0', background: '#fff', borderRadius: 20, padding: '5px 12px', fontSize: 11, cursor: 'pointer', color: '#334155', transition: 'all 0.15s', whiteSpace: 'nowrap', opacity: isLoading ? 0.5 : 1 }}>
                {qa.label}

            {messages.map(msg => <ChatBubble key={msg.id} msg={msg} lineSettings={lineSettings} onLineSend={() => setShowLineModal(true)} />)}
            <div ref={messagesEndRef} />
          </div>
          <div style={{ padding: '12px 16px', background: '#fff', borderTop: '1px solid #E2E8F0', display: 'flex', gap: 8, alignItems: 'flex-end', flexShrink: 0 }}>
            <textarea value={input} onChange={e => setInput(e.target.value)} onKeyDown={handleKeyDown}
              placeholder="メッセージを入力...（Enterで送信、Shift+Enterで改行）" disabled={isLoading} rows={1}
              style={{ flex: 1, border: '1px solid #CBD5E0', borderRadius: 10, padding: '10px 14px', fontSize: 14, fontFamily: 'inherit', resize: 'none', outline: 'none', minHeight: 44, lineHeight: 1.5 }}
              onInput={e => { e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px'; }}
            />
            <button onClick={() => sendMessage(input)} disabled={isLoading || !input.trim()}
              style={{ background: isLoading || !input.trim() ? '#94A3B8' : '#1F4E79', color: '#fff', border: 'none', borderRadius: 10, padding: '0 20px', cursor: isLoading || !input.trim() ? 'not-allowed' : 'pointer', fontSize: 14, fontWeight: 700, height: 44, minWidth: 76 }}>
              {isLoading ? '...' : '送信'}
            </button>
          </div>
        </div>
      );
    }

    // ── Enhanced Dashboard ──
    function DashboardContent({ stats, tasks }) {
      const [weekDeadlines, setWeekDeadlines] = React.useState([]);
      const [recentClients, setRecentClients] = React.useState([]);
      const [checklists, setChecklists] = React.useState([]);

      React.useEffect(() => {
        fetch(`${API}/api/calendar?days=7`).then(r => r.ok ? r.json() : {deadlines:[]}).then(d => setWeekDeadlines(d.deadlines || [])).catch(() => {});
        fetch(`${API}/api/clients`).then(r => r.ok ? r.json() : {clients:[]}).then(d => setRecentClients((d.clients || []).slice(0, 5))).catch(() => {});
        fetch(`${API}/api/checklists`).then(r => r.ok ? r.json() : {checklists:[]}).then(d => setChecklists(d.checklists || [])).catch(() => {});
      }, []);

      const checklistCompletion = React.useMemo(() => {
        if (checklists.length === 0) return 0;
        let total = 0, done = 0;
        checklists.forEach(cl => {
          (cl.items || []).forEach(item => { total++; if (item.is_checked) done++; });
        });
        return total > 0 ? Math.round((done / total) * 100) : 0;
      }, [checklists]);

      return (
        <>
          <h1 style={{ fontSize: 22, fontWeight: 700, marginBottom: 24, color: '#1F4E79' }}>ダッシュボード</h1>
          {stats && (
            <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap', marginBottom: 32 }}>
              <StatCard label="総エージェント数" value={stats.total_agents} color="#1F4E79" />
              <StatCard label="稼働中" value={stats.active_agents} sub="アクティブ" color="#22C55E" />
              <StatCard label="処理中" value={stats.busy_agents} sub="ビジー" color="#F59E0B" />
              <StatCard label="完了タスク総数" value={stats.tasks_completed_total} color="#2E75B6" />
              <StatCard label="未処理タスク" value={stats.tasks_pending_total} sub="要対応" color="#EF4444" />
              <StatCard label="チェックリスト進捗" value={`${checklistCompletion}%`} sub={`${checklists.length}件`} color="#6E2FBB" />
            </div>
          )}

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 32 }}>
            {/* 今週の期限 */}
            <div className="section-card">
              <div style={{ padding: '14px 18px', borderBottom: '1px solid #E2E8F0', fontWeight: 700, fontSize: 15, color: '#1F4E79' }}>📅 今週の期限</div>
              {weekDeadlines.length === 0 ? (
                <div style={{ padding: 20, color: '#94A3B8', textAlign: 'center', fontSize: 13 }}>今週の期限はありません</div>
              ) : weekDeadlines.slice(0, 5).map((d, i) => (
                <div key={i} style={{ padding: '10px 18px', borderBottom: '1px solid #F1F5F9', display: 'flex', alignItems: 'center', gap: 10 }}>
                  <span className={`deadline-pill ${new Date(d.deadline_date || d.due_date) < new Date() ? 'overdue' : 'soon'}`}>{d.deadline_date || d.due_date || ''}</span>
                  <span style={{ fontSize: 13, fontWeight: 500 }}>{d.deadline_type || d.title || ''}</span>
                </div>
              ))}
            </div>

            {/* 最近の顧問先 */}
            <div className="section-card">
              <div style={{ padding: '14px 18px', borderBottom: '1px solid #E2E8F0', fontWeight: 700, fontSize: 15, color: '#1F4E79' }}>👥 最近の顧問先</div>
              {recentClients.length === 0 ? (
                <div style={{ padding: 20, color: '#94A3B8', textAlign: 'center', fontSize: 13 }}>顧問先が登録されていません</div>
              ) : recentClients.map((c, i) => (
                <div key={i} style={{ padding: '10px 18px', borderBottom: '1px solid #F1F5F9', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 600 }}>{c.name}</div>
                    <div style={{ fontSize: 11, color: '#64748B' }}>{c.representative}</div>
                  </div>
                  <span className={`badge ${c.client_type === '法人' ? 'badge-blue' : 'badge-green'}`}>{c.client_type || '法人'}</span>
                </div>
              ))}
            </div>
          </div>

          <h2 style={{ fontSize: 16, fontWeight: 700, marginBottom: 14, color: '#334155' }}>直近のタスク</h2>
          <div className="section-card">
            {tasks.filter(t => t.status !== 'done').slice(0, 6).map(t => <TaskRow key={t.id} task={t} />)}
            {tasks.filter(t => t.status !== 'done').length === 0 && (
              <div style={{ padding: 24, color: '#94A3B8', textAlign: 'center' }}>未処理のタスクはありません</div>
            )}
          </div>
        </>
      );
    }

    // ── Main App ──
    function App() {
      const [agents, setAgents] = React.useState([]);
      const [tasks, setTasks] = React.useState([]);
      const [stats, setStats] = React.useState(null);
      const [selectedAgent, setSelectedAgent] = React.useState(null);
      const [loading, setLoading] = React.useState(true);
      const [error, setError] = React.useState(null);
      const [activeTab, setActiveTab] = React.useState('dashboard');

      React.useEffect(() => {
        Promise.all([
          fetch(`${API}/api/agents`).then(r => r.json()),
          fetch(`${API}/api/tasks`).then(r => r.json()),
          fetch(`${API}/api/stats`).then(r => r.json()),
        ]).then(([a, t, s]) => { setAgents(a); setTasks(t); setStats(s); setLoading(false); })
          .catch(() => { setError('バックエンドAPIに接続できません（port 8000）'); setLoading(false); });
      }, []);

      const filteredTasks = selectedAgent ? tasks.filter(t => t.agent_id === selectedAgent) : tasks;

      const NavBtn = ({ label, tabKey }) => (
        <button onClick={() => setActiveTab(tabKey)}
          className={`nav-btn ${activeTab === tabKey ? 'active' : ''}`}>
          {label}
        </button>
      );

      const isAgentTab = Object.keys(ALL_AGENTS).includes(activeTab);
      const isContentTab = ['dashboard', 'agents', 'tasks', 'clients', 'calendar', 'checklists', 'documents', 'settings'].includes(activeTab);

      return (
        <div style={{ display: 'flex', minHeight: '100vh' }}>
          {/* Sidebar */}
          <aside style={{ width: 220, background: '#0F2744', color: '#fff', display: 'flex', flexDirection: 'column', flexShrink: 0 }}>
            <div style={{ padding: '28px 20px 16px' }}>
              <div style={{ fontSize: 11, color: '#60A5FA', fontWeight: 700, letterSpacing: 1, marginBottom: 6 }}>税理士事務所</div>
              <div style={{ fontSize: 16, fontWeight: 700, lineHeight: 1.4 }}>AI エージェント<br />管理ダッシュボード</div>
            </div>
            <hr style={{ border: 'none', borderTop: '1px solid #1E3A5F', margin: '0 16px 12px' }} />
            <nav style={{ display: 'flex', flexDirection: 'column', gap: 2, padding: '0 12px', flex: 1, overflowY: 'auto' }}>
              <NavBtn label="📊 ダッシュボード" tabKey="dashboard" />
              <NavBtn label="🤖 エージェント一覧" tabKey="agents" />
              <NavBtn label="📋 タスク一覧" tabKey="tasks" />
              <div style={{ borderTop: '1px solid #1E3A5F', margin: '8px 4px', opacity: 0.5 }} />
              <div style={{ fontSize: 10, color: '#475569', padding: '2px 8px', letterSpacing: 1 }}>管理機能</div>
              <NavBtn label="👥 顧問先管理" tabKey="clients" />
              <NavBtn label="📅 申告カレンダー" tabKey="calendar" />
              <NavBtn label="✅ チェックリスト" tabKey="checklists" />
              <NavBtn label="📄 書類管理" tabKey="documents" />
              <div style={{ borderTop: '1px solid #1E3A5F', margin: '8px 4px', opacity: 0.5 }} />
              <div style={{ fontSize: 10, color: '#475569', padding: '2px 8px', letterSpacing: 1 }}>AI エージェント</div>
              {Object.entries(ALL_AGENTS).map(([id, a]) => (
                <NavBtn key={id} label={`${a.label} ${a.name}`} tabKey={id} />
              ))}
              <div style={{ borderTop: '1px solid #1E3A5F', margin: '8px 4px', opacity: 0.5 }} />
              <NavBtn label="⚙️ 設定" tabKey="settings" />
            </nav>
            <div style={{ padding: '16px 20px', fontSize: 11, color: '#475569' }}>v0.5.0 — {new Date().toLocaleDateString('ja-JP')}</div>
          </aside>

          {/* Main area */}
          <main style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
            {/* Agent chat tabs */}
            {Object.entries(ALL_AGENTS).map(([id, a]) =>
              activeTab === id ? (
                <AgentChat
                  key={id}
                  agentId={id}
                  agentName={`${a.name} エージェント`}
                  agentColor={a.color}
                  agentInitial={a.initial}
                  modelLabel="Claude Opus 4.6 · Adaptive Thinking"
                  quickActions={AGENT_QUICK_ACTIONS[id] || []}
                  apiPath={a.path}
                />
              ) : null
            )}

            {/* Content tabs */}
            {isContentTab && (
              <div style={{ flex: 1, padding: '32px', overflowY: 'auto' }}>
                {loading && activeTab !== 'clients' && activeTab !== 'calendar' && activeTab !== 'checklists' && activeTab !== 'documents' && activeTab !== 'settings' && (
                  <div style={{ color: '#64748B', fontSize: 16, marginTop: 40, textAlign: 'center' }}>読み込み中...</div>
                )}
                {error && activeTab === 'dashboard' && (
                  <div style={{ background: '#FEF2F2', border: '1px solid #FECACA', color: '#DC2626', borderRadius: 10, padding: '16px 20px', marginBottom: 24 }}>⚠️ {error}</div>
                )}

                {activeTab === 'dashboard' && !loading && (
                  <DashboardContent stats={stats} tasks={tasks} />
                )}

                {activeTab === 'agents' && !loading && (
                  <>
                    <h1 style={{ fontSize: 22, fontWeight: 700, marginBottom: 8, color: '#1F4E79' }}>エージェント一覧</h1>
                    <p style={{ color: '#64748B', fontSize: 13, marginBottom: 20 }}>クリックで担当タスクを絞り込み</p>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(230px, 1fr))', gap: 12, marginBottom: 28 }}>
                      {agents.map(a => (
                        <AgentCard key={a.id} agent={a} selected={selectedAgent === a.id}
                          onClick={() => setSelectedAgent(selectedAgent === a.id ? null : a.id)} />
                      ))}
                    </div>
                    {selectedAgent && (
                      <>
                        <h2 style={{ fontSize: 16, fontWeight: 700, marginBottom: 14, color: '#334155' }}>
                          {agents.find(a => a.id === selectedAgent)?.name} の担当タスク
                        </h2>
                        <div className="section-card">
                          {filteredTasks.length === 0
                            ? <div style={{ padding: 24, color: '#94A3B8', textAlign: 'center' }}>タスクなし</div>
                            : filteredTasks.map(t => <TaskRow key={t.id} task={t} />)}
                        </div>
                      </>
                    )}
                  </>
                )}

                {activeTab === 'tasks' && <TasksTab />}

                {activeTab === 'clients' && <ClientsTab />}

                {activeTab === 'calendar' && <CalendarTab />}

                {activeTab === 'checklists' && <ChecklistsTab />}

                {activeTab === 'documents' && <DocumentsTab />}

                {activeTab === 'settings' && <SettingsTab />}
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
